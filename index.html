<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Addlife</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <span class="app-header-title">CRM Addlife</span>
        <div class="ios-toggle-wrap">
            <span class="toggle-icon">☀️</span>
            <label class="ios-toggle">
                <input type="checkbox" id="theme-toggle">
                <div class="ios-toggle-track"></div>
                <div class="ios-toggle-thumb"></div>
            </label>
            <span class="toggle-icon">🌙</span>
        </div>
    </header>

    <div id="app-content"></div>

    <nav id="main-sidebar" class="bottom-nav" style="display: none;">
        <button class="nav-btn active" data-target="dashboard"><span class="icon">🏠</span><span class="label">Inicio</span></button>
        <button class="nav-btn" data-target="prospeccion"><span class="icon">🎯</span><span class="label">Prospectos</span></button>
        <button class="nav-btn" data-target="actividad"><span class="icon">📈</span><span class="label">Actividad</span></button>
        <button class="nav-btn nav-btn-logout" onclick="cerrarSesion()"><span class="icon">🚪</span><span class="label">Salir</span></button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
