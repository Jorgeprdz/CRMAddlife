<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Addlife</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Entintado de barra de estado -->
    <meta name="theme-color" id="meta-theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- HEADER CON BLUR -->
    <header class="top-bar nav-oculto" id="main-header">
        <span class="top-bar__title" id="header-title">CRM Addlife</span>
        <div class="top-bar__right">
            <!-- TOGGLE DARK/LIGHT iOS -->
            <label class="theme-switch" title="Modo oscuro">
                <input type="checkbox" id="theme-toggle">
                <span class="theme-switch__track">
                    <span class="theme-switch__thumb">
                        <span class="theme-switch__icon" id="theme-icon">☀️</span>
                    </span>
                </span>
            </label>
        </div>
    </header>

    <main id="app-content"></main>

    <!-- NAV PÍLDORA FLOTANTE -->
    <nav class="bottom-nav nav-oculto" id="main-nav">
        <button class="nav-btn" data-target="dashboard">
            <span class="icon">🏠</span>Inicio
        </button>
        <button class="nav-btn" data-target="prospeccion">
            <span class="icon">💬</span>Prospección
        </button>
        <button class="nav-btn" data-target="referidos">
            <span class="icon">👥</span>Referidos
        </button>
        <button class="nav-btn" data-target="actividad">
            <span class="icon">📊</span>Actividad
        </button>
        <button class="nav-btn" data-target="cartera">
            <span class="icon">💼</span>Cartera
        </button>
        <button class="nav-btn nav-btn--logout" id="btn-cerrar-sesion">
            <span class="icon">🔒</span>Salir
        </button>
    </nav>

    <!-- CORRECCIÓN: type="module" en todos los scripts para que funcionen los import/export -->
    <script type="module" src="app.js"></script>

</body>
</html>
